<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #f8fafc;
      overflow-x: hidden;
    }

    /* ── Header ────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
    }

    /* ── Toggle Switch ──────────────────────────── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toggle-wrap label { font-size: 12px; color: #64748b; cursor: pointer; user-select: none; }
    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #cbd5e1;
      border-radius: 20px;
      transition: background .2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      bottom: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked + .slider { background: #4338ca; }
    .switch input:checked + .slider::before { transform: translateX(14px); }

    /* ── Toolbar ────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      color: #64748b;
      font-size: 12px;
    }
    #clearBtn {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 12px;
      color: #ef4444;
      cursor: pointer;
    }
    #clearBtn:hover { background: #fef2f2; }

    /* ── Empty State ────────────────────────────── */
    .empty {
      text-align: center;
      padding: 48px 16px;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.6;
    }
    .empty strong { display: block; font-size: 15px; color: #64748b; }

    /* ── Record Card ────────────────────────────── */
    .record {
      margin: 0 12px 8px;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      overflow: hidden;
    }
    .record-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
    }
    .record-head:hover { background: #f1f5f9; }
    .record-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .record-time { color: #64748b; font-variant-numeric: tabular-nums; }
    .record-source {
      background: #eef2ff;
      color: #4338ca;
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 500;
    }
    .record-arrow { color: #94a3b8; font-size: 10px; transition: transform .15s; }
    .record-arrow.open { transform: rotate(90deg); }

    .record-body {
      border-top: 1px solid #e2e8f0;
      padding: 8px 12px 12px;
      display: none;
      font-size: 12px;
    }
    .record-body.open { display: block; }

    .record-body .info-line {
      display: flex;
      gap: 4px;
      margin-bottom: 4px;
      word-break: break-all;
    }
    .record-body .info-line .label {
      color: #94a3b8;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Code Block ─────────────────────────────── */
    .code-block {
      margin-top: 6px;
    }
    .code-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .code-block-header .lang { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; }
    .code-block-header .copy-btn {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 1px 8px;
      font-size: 11px;
      color: #4338ca;
      cursor: pointer;
    }
    .code-block-header .copy-btn:hover { background: #eef2ff; }
    .code-block pre {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 8px 10px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 11px;
      line-height: 1.5;
      max-height: 200px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Dev notice ─────────────────────────────── */
    .dev-notice {
      margin: 8px 12px;
      padding: 8px 12px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 4px;
      font-size: 12px;
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Markdown Grabber</h1>
    <div class="toggle-wrap">
      <label for="debugToggle">Debug</label>
      <label class="switch">
        <input type="checkbox" id="debugToggle" />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="toolbar">
    <span id="recordCount">0 records</span>
    <button id="clearBtn">Clear All</button>
  </div>

  <div id="records"></div>

  <script src="popup.js"></script>
</body>
</html>
