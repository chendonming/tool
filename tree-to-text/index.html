<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>树结构 → Unicode 文本转换器</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>
<div class="glow-orb glow-orb-3"></div>

<div class="app-container">

  <!-- Header -->
  <header class="header">
    <span class="logo-icon">🌳</span>
    <h1>树结构 → Unicode</h1>
    <p class="subtitle">可视化的树编辑器 · AI 友好的文字输出</p>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="tool-btn" id="addRootBtn" title="添加根节点">＋ 添加根节点</button>
    <button class="tool-btn" id="expandAllBtn" title="全部展开">▼ 全部展开</button>
    <button class="tool-btn" id="collapseAllBtn" title="全部折叠">▶ 全部折叠</button>
    <button class="tool-btn" id="resetBtn" title="重置">↺ 重置</button>
    <span class="toolbar-spacer"></span>
    <button class="tool-btn primary" id="copyBtn" title="复制 Unicode 文本">📋 复制</button>
    <button class="tool-btn" id="exportBtn" title="导出 JSON">↓ JSON</button>
    <button class="tool-btn" id="importBtn" title="从 JSON 导入">↑ JSON</button>
    <input type="file" id="importFileInput" accept=".json" style="display:none">
  </div>

  <!-- Main -->
  <div class="main-layout">
    <!-- Left: Tree Editor -->
    <section class="panel editor-panel">
      <div class="panel-header">
        <span class="panel-title">✏️ 树编辑器</span>
        <span class="panel-hint">点击标签编辑 · 悬停操作</span>
      </div>
      <div class="tree-container" id="treeContainer">
        <div class="tree-placeholder">加载中...</div>
      </div>
    </section>

    <!-- Right: Unicode Output -->
    <section class="panel output-panel">
      <div class="panel-header">
        <span class="panel-title">📄 Unicode 输出</span>
        <span class="panel-hint">AI 可直接读取</span>
      </div>
      <div class="output-container">
        <pre class="unicode-output" id="unicodeOutput">Loading...</pre>
        <div class="output-stats" id="outputStats"></div>
      </div>
    </section>
  </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
